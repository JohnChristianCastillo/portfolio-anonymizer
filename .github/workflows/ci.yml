name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets the workflow be started by hand from the Actions tab, which is useful for
  # re-running the checks without pushing a commit.
  workflow_dispatch:

jobs:
  python:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      # The quick suite covers rule matching, span replacement, overlap resolution
      # and scoring, none of which need a model to be loaded. The model-backed API
      # tests are marked slow and left out, so CI does not pull ~400 MB of weights
      # from the Hugging Face hub on every run.
      - name: Test
        run: uv run pytest -m "not slow" -q

  frontend:
    name: Build the front end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
